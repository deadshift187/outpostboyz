<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Block Nine</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#12131f;--bg2:#0d0e18;--panel:#1b1d2e;--line:#2c2f47;--line2:#3a3e5e;
    --ink:#eef0fa;--ink-dim:#9aa0c2;--ink-faint:#666c8f;
    --cell:#20233a;--cellline:#2a2e49;
    --accent:#ffb340;--accent2:#7c6cff;--good:#54e6a2;--bad:#ff6b7d;
    --mono: ui-monospace,"Cascadia Code","Consolas",monospace;
    --body: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 80% at 50% -10%, #1c1e33, var(--bg2));color:var(--ink);
    font-family:var(--body);display:flex;flex-direction:column;align-items:center;
    user-select:none;-webkit-user-select:none;overscroll-behavior:none;touch-action:manipulation}
  .app{width:100%;max-width:480px;padding:14px 14px 24px;display:flex;flex-direction:column;gap:12px;min-height:100%}

  .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .t{font-weight:900;font-size:22px;letter-spacing:.02em}
  .brand .t b{color:var(--accent)}
  .brand .s{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px}
  .modewrap{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px}
  .mode{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;border:0;background:transparent;color:var(--ink-dim);padding:7px 12px;border-radius:999px;cursor:pointer;font-weight:700}
  .mode[aria-pressed="true"]{background:var(--accent);color:#241701}
  .mode.hard[aria-pressed="true"]{background:var(--bad);color:#2a060a}

  .scores{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .scorebox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;text-align:center}
  .scorebox .lab{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
  .scorebox .num{font-weight:900;font-size:26px;font-variant-numeric:tabular-nums;margin-top:2px}
  .scorebox.best .num{color:var(--accent)}

  .boardwrap{position:relative;width:100%;aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:10px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  #board{position:relative;width:100%;height:100%;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);gap:3px;touch-action:none}
  .c{background:var(--cell);border-radius:5px;transition:background .05s, transform .07s}
  /* subtle 3x3 box tint (no margins — keeps drag math uniform) */
  .c.box{background:#242745}
  .c.fill{transition:none}
  .c.prev{background:rgba(255,179,64,.28);box-shadow:inset 0 0 0 1px rgba(255,179,64,.5)}
  .c.prev.bad{background:rgba(255,107,125,.22);box-shadow:inset 0 0 0 1px rgba(255,107,125,.45)}
  .c.clearing{animation:pop .13s ease forwards}
  @keyframes pop{0%{transform:scale(1)}100%{transform:scale(.35);opacity:0}}

  .tray{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;min-height:104px}
  .slot{background:var(--panel);border:1px solid var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;padding:10px;touch-action:none}
  .slot.used{background:transparent;border-style:dashed;border-color:#ffffff16}
  .slot.lifted{border-style:dashed;border-color:var(--accent)}
  .slot.lifted .piece{opacity:.22}
  .piece{display:grid;gap:3px;touch-action:none;cursor:grab}
  .pb{width:var(--pb,22px);height:var(--pb,22px);border-radius:5px}
  .pb.empty{background:transparent}

  .ghost{position:fixed;left:0;top:0;display:grid;gap:3px;pointer-events:none;z-index:100;opacity:.92;filter:drop-shadow(0 8px 14px rgba(0,0,0,.5))}

  .combo{position:absolute;left:50%;top:44%;transform:translateX(-50%);font-weight:900;font-size:34px;color:var(--accent);
    text-shadow:0 2px 20px rgba(255,179,64,.6);pointer-events:none;opacity:0}
  .combo.show{animation:combo .62s ease forwards}
  @keyframes combo{0%{opacity:0;transform:translateX(-50%) scale(.6)}25%{opacity:1;transform:translateX(-50%) scale(1.1)}70%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(1)}}

  .over{position:absolute;inset:0;background:rgba(13,14,24,.92);backdrop-filter:blur(4px);border-radius:18px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;z-index:120}
  .over.show{display:flex}
  .over h2{margin:0;font-size:30px;font-weight:900}
  .over .fin{font-family:var(--mono);color:var(--ink-dim);font-size:14px}
  .over .fin b{color:var(--accent);font-size:22px}
  .over .newbest{color:var(--good);font-weight:800;font-family:var(--mono);font-size:13px;letter-spacing:.08em}
  .btn{border:0;border-radius:12px;padding:13px 26px;font-weight:800;font-size:16px;cursor:pointer;background:var(--accent);color:#241701}
  .btn.ghostbtn{background:transparent;border:1px solid var(--line2);color:var(--ink)}
  .hint{font-family:var(--mono);font-size:11px;color:var(--ink-faint);text-align:center;letter-spacing:.04em}
  .chal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px;margin-top:2px}
  .chalrow{display:flex;gap:8px;align-items:center}
  .clab{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap}
  #code,#finCode{font-family:var(--mono);font-weight:800;font-size:16px;letter-spacing:.14em;color:var(--accent);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;flex:1;text-align:center}
  .cbtn{border:1px solid var(--line2);background:var(--bg2);color:var(--ink);border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
  .cbtn.go{background:var(--accent);color:#241701;border-color:var(--accent)}
  #codeIn{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);font-family:var(--mono);font-size:14px;letter-spacing:.1em;text-transform:uppercase}
  #codeIn::placeholder{color:var(--ink-faint);letter-spacing:0;text-transform:none}
  .chalnote{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-align:center}
  .toast2{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);opacity:0;background:var(--good);color:#04231a;font-family:var(--mono);font-size:13px;font-weight:800;padding:11px 18px;border-radius:10px;pointer-events:none;transition:.22s;z-index:200}
  .toast2.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<a href="../../" style="position:fixed;top:10px;right:10px;z-index:99;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:1px;color:#9aa0c2;text-decoration:none;background:rgba(13,14,24,0.8);border:1px solid #2c2f47;border-radius:8px;padding:7px 10px;">&#9666; OUTPOST BOYZ</a>
<div class="app">
  <div class="top">
    <div class="brand"><span class="t">BLOCK <b>NINE</b></span><span class="s">Outpost Boys</span></div>
    <div class="modewrap" id="modes">
      <button class="mode" data-mode="normal" aria-pressed="true">Chill</button>
      <button class="mode hard" data-mode="hard" aria-pressed="false">Hard</button>
    </div>
  </div>

  <div class="scores">
    <div class="scorebox"><div class="lab">Score</div><div class="num" id="score">0</div></div>
    <div class="scorebox best"><div class="lab">Best</div><div class="num" id="best">0</div></div>
  </div>

  <div class="boardwrap">
    <div id="board"></div>
    <div class="combo" id="combo"></div>
    <div class="over" id="over">
      <h2>No moves left!</h2>
      <div class="newbest" id="newbest" style="display:none">★ NEW BEST ★</div>
      <div class="fin">You scored <b id="finalScore">0</b></div>
      <div class="fin" style="margin-top:-4px">Board code <span id="finCode">—</span></div>
      <button class="btn ghostbtn" id="copyFin">Copy code — challenge a friend</button>
      <button class="btn" id="again">Play again</button>
    </div>
  </div>

  <div class="tray" id="tray"></div>
  <div class="hint">Tap a piece to rotate ↻ &nbsp;•&nbsp; drag it onto the grid &nbsp;•&nbsp; fill a row, column, or 3×3 box to clear.</div>
  <div class="chal">
    <div class="chalrow"><span class="clab">Board code</span><span id="code">—</span><button class="cbtn" id="copyCode">Copy</button></div>
    <div class="chalrow"><input id="codeIn" placeholder="Enter a friend's code…" autocomplete="off" spellcheck="false"><button class="cbtn go" id="goCode">Play it</button></div>
    <div class="chalnote">⚔️ Same pieces + same board. Higher score wins.</div>
  </div>
</div>
<div class="toast2" id="toast2"></div>

<script>
const N=9, BOX=3;
let board, pieces, score, combo, mode, best, dragging=null;
const boardEl=document.getElementById('board');
const trayEl=document.getElementById('tray');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const comboEl=document.getElementById('combo');
const overEl=document.getElementById('over');
const cells=[];

// ---- shapes (normalized offset lists) ----
const S={
  single:[[0,0]],
  dom_h:[[0,0],[0,1]], dom_v:[[0,0],[1,0]],
  tri_h:[[0,0],[0,1],[0,2]], tri_v:[[0,0],[1,0],[2,0]],
  cor_tl:[[0,0],[0,1],[1,0]], cor_tr:[[0,0],[0,1],[1,1]], cor_bl:[[0,0],[1,0],[1,1]], cor_br:[[0,1],[1,0],[1,1]],
  sq2:[[0,0],[0,1],[1,0],[1,1]],
  line4_h:[[0,0],[0,1],[0,2],[0,3]], line4_v:[[0,0],[1,0],[2,0],[3,0]],
  line5_h:[[0,0],[0,1],[0,2],[0,3],[0,4]], line5_v:[[0,0],[1,0],[2,0],[3,0],[4,0]],
  L1:[[0,0],[1,0],[2,0],[2,1]], L2:[[0,0],[0,1],[0,2],[1,0]], L3:[[0,0],[0,1],[1,1],[2,1]], L4:[[0,2],[1,0],[1,1],[1,2]],
  J1:[[0,1],[1,1],[2,0],[2,1]], J2:[[0,0],[1,0],[1,1],[1,2]], J3:[[0,0],[0,1],[1,0],[2,0]], J4:[[0,0],[0,1],[0,2],[1,2]],
  T1:[[0,0],[0,1],[0,2],[1,1]], T2:[[0,0],[1,0],[1,1],[2,0]], T3:[[0,1],[1,0],[1,1],[1,2]], T4:[[0,1],[1,0],[1,1],[2,1]],
  S1:[[0,1],[0,2],[1,0],[1,1]], S2:[[0,0],[1,0],[1,1],[2,1]],
  Z1:[[0,0],[0,1],[1,1],[1,2]], Z2:[[0,1],[1,0],[1,1],[2,0]],
  plus:[[0,1],[1,0],[1,1],[1,2],[2,1]],
  cor3_tl:[[0,0],[0,1],[0,2],[1,0],[2,0]], cor3_tr:[[0,0],[0,1],[0,2],[1,2],[2,2]],
  cor3_bl:[[0,0],[1,0],[2,0],[2,1],[2,2]], cor3_br:[[0,2],[1,2],[2,0],[2,1],[2,2]],
  sq3:[[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]]
};
const PAL=['#ffb340','#7c6cff','#54e6a2','#ff6b7d','#48c6ff','#f57ee0','#ffd166'];

// weighted bags: [shapeKey, weight]
const BAG_CHILL=[['single',3],['dom_h',4],['dom_v',4],['tri_h',4],['tri_v',4],
  ['cor_tl',4],['cor_tr',4],['cor_bl',4],['cor_br',4],['sq2',4],
  ['line4_h',2],['line4_v',2],['L1',2],['L2',2],['L3',2],['L4',2],['J1',2],['J2',2],['J3',2],['J4',2],
  ['T1',2],['T2',2],['T3',2],['T4',2]];
const BAG_HARD=[['single',1],['dom_h',2],['dom_v',2],['tri_h',2],['tri_v',2],
  ['sq2',3],['line4_h',3],['line4_v',3],['line5_h',3],['line5_v',3],
  ['L1',3],['L2',3],['L3',3],['L4',3],['J1',3],['J2',3],['J3',3],['J4',3],
  ['S1',3],['S2',3],['Z1',3],['Z2',3],['T1',2],['T2',2],['T3',2],['T4',2],
  ['plus',3],['cor3_tl',3],['cor3_tr',3],['cor3_bl',3],['cor3_br',3],['sq3',2]];

const GAP=3;
function buildBoardDOM(){
  boardEl.innerHTML='';cells.length=0;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div');d.className='c';d.dataset.r=r;d.dataset.c=c;
    if((Math.floor(r/3)+Math.floor(c/3))%2===1)d.classList.add('box');
    boardEl.appendChild(d);cells.push(d);
  }
}
function cellAt(r,c){return cells[r*N+c];}

function pick(bag){
  let tot=0;for(const [,w] of bag)tot+=w;
  let x=Math.floor(rng()*tot);
  for(const [k,w] of bag){if(x<w)return k;x-=w;}
  return bag[0][0];
}
// seeded RNG so a shared code reproduces the exact same run
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
let rng=Math.random, curSeed=0;
function encodeCode(){return (mode==='hard'?'H':'C')+curSeed.toString(36).toUpperCase();}
function decodeCode(str){str=(str||'').trim().toUpperCase();if(!str)return null;
  const m=str[0]==='H'?'hard':(str[0]==='C'?'normal':null);if(m===null)return null;
  const seed=parseInt(str.slice(1),36);if(isNaN(seed))return null;return{mode:m,seed:seed>>>0};}

function newPiece(){
  const key=pick(mode==='hard'?BAG_HARD:BAG_CHILL);
  return {base:S[key],step:0,shape:S[key].map(a=>a.slice()),color:PAL[Math.floor(rng()*PAL.length)],used:false};
}
function refillPieces(){pieces=[newPiece(),newPiece(),newPiece()];renderTray();}

function pieceDims(shape){let mr=0,mc=0;for(const[r,c]of shape){mr=Math.max(mr,r);mc=Math.max(mc,c);}return{h:mr+1,w:mc+1};}
function normShape(cells){const mr=Math.min(...cells.map(x=>x[0])),mc=Math.min(...cells.map(x=>x[1]));return cells.map(([r,c])=>[r-mr,c-mc]);}
function rotateCW(shape){return normShape(shape.map(([r,c])=>[c,-r]));}
function mirrorShape(shape){return normShape(shape.map(([r,c])=>[r,-c]));}
// 8 orientations: 4 rotations, then the mirrored 4. Rotating alone can never turn a J into an L,
// which is why the "reverse L" felt missing — now a tap cycles all the way round to it.
function orient(base,step){
  let sh=(step>=4)?mirrorShape(base):base.map(a=>a.slice());
  for(let i=0;i<(step%4);i++) sh=rotateCW(sh);
  return normShape(sh);
}
function rotatePiece(idx){const p=pieces[idx];if(p.used)return;
  p.step=(p.step+1)%8; p.shape=orient(p.base,p.step);}

function renderTray(){
  trayEl.innerHTML='';
  pieces.forEach((p,i)=>{
    const slot=document.createElement('div');slot.className='slot'+(p.used?' used':'');
    if(!p.used){
      const{h,w}=pieceDims(p.shape);
      const wrap=document.createElement('div');wrap.className='piece';
      wrap.style.gridTemplateColumns=`repeat(${w},var(--pb,22px))`;
      wrap.style.gridTemplateRows=`repeat(${h},var(--pb,22px))`;
      const set=new Set(p.shape.map(([r,c])=>r+'_'+c));
      for(let r=0;r<h;r++)for(let c=0;c<w;c++){
        const b=document.createElement('div');
        if(set.has(r+'_'+c)){b.className='pb';b.style.background=p.color;}
        else b.className='pb empty';
        wrap.appendChild(b);
      }
      wrap.addEventListener('pointerdown',e=>startDrag(e,i));
      slot.appendChild(wrap);
    }
    trayEl.appendChild(slot);
  });
}

function metrics(){const rect=boardEl.getBoundingClientRect();const cs=(rect.width-GAP*(N-1))/N;return{rect,cs,step:cs+GAP};}

function startDrag(e,idx){
  if(pieces[idx].used)return;
  e.preventDefault();
  const p=pieces[idx];const{cs}=metrics();
  const g=document.createElement('div');g.className='ghost';
  const{h,w}=pieceDims(p.shape);
  g.style.gridTemplateColumns=`repeat(${w},${cs}px)`;
  g.style.gridTemplateRows=`repeat(${h},${cs}px)`;
  g.style.gap='3px';
  const set=new Set(p.shape.map(([r,c])=>r+'_'+c));
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    const b=document.createElement('div');b.style.width=cs+'px';b.style.height=cs+'px';b.style.borderRadius='5px';
    b.style.background=set.has(r+'_'+c)?p.color:'transparent';g.appendChild(b);
  }
  g.style.display='none';
  document.body.appendChild(g);
  const slotEl=trayEl.children[idx]; if(slotEl)slotEl.classList.add('lifted');
  dragging={idx,p,g,w,h,cs,startX:e.clientX,startY:e.clientY,moved:false};
  moveGhost(e.clientX,e.clientY);
  window.addEventListener('pointermove',onMove,{passive:false});
  window.addEventListener('pointerup',onUp);
}
function moveGhost(x,y){
  if(!dragging)return;const{g,w,h,cs}=dragging;
  const pxw=w*cs+(w-1)*GAP, pxh=h*cs+(h-1)*GAP;
  // center horizontally on finger, lift the piece ABOVE the finger so it's visible
  const left=x-pxw/2, top=y-pxh-52;
  g.style.transform=`translate(${left}px,${top}px)`;
  dragging.originX=left;dragging.originY=top;
}
function targetCell(){
  const{rect,step}=metrics();const{originX,originY}=dragging;
  const col=Math.round((originX-rect.left)/step);
  const row=Math.round((originY-rect.top)/step);
  return{row,col};
}
function canPlace(shape,row,col){
  for(const[dr,dc]of shape){const r=row+dr,c=col+dc;
    if(r<0||r>=N||c<0||c>=N)return false;
    if(board[r][c])return false;}
  return true;
}
function clearPrev(){cells.forEach(d=>d.classList.remove('prev','bad'));}
function onMove(e){
  if(!dragging)return;e.preventDefault();
  if(!dragging.moved){const dx=e.clientX-dragging.startX,dy=e.clientY-dragging.startY;
    if(dx*dx+dy*dy>81){dragging.moved=true;dragging.g.style.display='grid';}}
  moveGhost(e.clientX,e.clientY);
  clearPrev();
  if(!dragging.moved)return;
  const{row,col}=targetCell();const ok=canPlace(dragging.p.shape,row,col);
  for(const[dr,dc]of dragging.p.shape){const r=row+dr,c=col+dc;
    if(r>=0&&r<N&&c>=0&&c<N){const el=cellAt(r,c);el.classList.add('prev');if(!ok)el.classList.add('bad');}}
}
function onUp(){
  if(!dragging)return;
  window.removeEventListener('pointermove',onMove);
  window.removeEventListener('pointerup',onUp);
  const{p,idx,g,moved}=dragging;
  const slotEl=trayEl.children[idx]; if(slotEl)slotEl.classList.remove('lifted');
  g.remove();clearPrev();
  if(!moved){ rotatePiece(idx); sizePieces(); renderTray(); dragging=null; return; }
  const t=targetCell();
  if(canPlace(p.shape,t.row,t.col)){
    for(const[dr,dc]of p.shape){board[t.row+dr][t.col+dc]=p.color;}
    paintBoard();
    score+=p.shape.length;
    pieces[idx].used=true;
    resolveClears();
    if(pieces.every(pp=>pp.used))refillPieces();
    renderTray();
    updateScore();
    checkGameOver();
    if(!overEl.classList.contains('show'))saveGame();
  }
  dragging=null;
}

function paintBoard(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const el=cellAt(r,c);
    if(board[r][c]){el.classList.add('fill');el.style.background=board[r][c];}
    else{el.classList.remove('fill');el.style.background='';}
  }
}
function fullRows(){const o=[];for(let r=0;r<N;r++)if(board[r].every(v=>v))o.push(r);return o;}
function fullCols(){const o=[];for(let c=0;c<N;c++){let f=true;for(let r=0;r<N;r++)if(!board[r][c]){f=false;break;}if(f)o.push(c);}return o;}
function fullBoxes(){const o=[];for(let br=0;br<N;br+=BOX)for(let bc=0;bc<N;bc+=BOX){let f=true;
  for(let r=br;r<br+BOX;r++)for(let c=bc;c<bc+BOX;c++)if(!board[r][c])f=false;
  if(f)o.push([br,bc]);}return o;}

function resolveClears(){
  const rows=fullRows(),cols=fullCols(),boxes=fullBoxes();
  const lines=rows.length+cols.length+boxes.length;
  if(lines===0){combo=0;return;}
  const toClear=new Set();
  rows.forEach(r=>{for(let c=0;c<N;c++)toClear.add(r+'_'+c);});
  cols.forEach(c=>{for(let r=0;r<N;r++)toClear.add(r+'_'+c);});
  boxes.forEach(([br,bc])=>{for(let r=br;r<br+BOX;r++)for(let c=bc;c<bc+BOX;c++)toClear.add(r+'_'+c);});
  combo++;
  const cellsCleared=toClear.size;
  const gained=cellsCleared*2 + lines*10*combo + (lines>1?lines*15:0);
  score+=gained;
  toClear.forEach(k=>{const[r,c]=k.split('_').map(Number);board[r][c]=0;cellAt(r,c).classList.add('clearing');});
  setTimeout(()=>{toClear.forEach(k=>{const[r,c]=k.split('_').map(Number);const el=cellAt(r,c);el.classList.remove('clearing','fill');el.style.background='';});},130);
  if(lines>1||combo>1){
    comboEl.textContent=(combo>1?combo+'x ':'')+ (lines>1?lines+' CLEARS!':'CLEAR!');
    comboEl.classList.remove('show');void comboEl.offsetWidth;comboEl.classList.add('show');
  }
  updateScore();
}

function anyMove(){
  for(const p of pieces){if(p.used)continue;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(canPlace(p.shape,r,c))return true;}
  return false;
}
function checkGameOver(){
  if(!anyMove()){
    const isBest=score>best;
    if(isBest){best=score;saveBest();bestEl.textContent=best;}
    document.getElementById('finalScore').textContent=score;
    document.getElementById('finCode').textContent=encodeCode();
    document.getElementById('newbest').style.display=isBest?'block':'none';
    overEl.classList.add('show'); clearSave(); if(window.OB){OB.submitScore('block-nine',score);OB.gameOver('block-nine');}
  }
}
function updateScore(){scoreEl.textContent=score;if(score>best){best=score;bestEl.textContent=best;saveBest();}}
function bestKey(){return 'blocknine_best_'+mode;}
function loadBest(){best=parseInt(localStorage.getItem(bestKey())||'0',10)||0;bestEl.textContent=best;}
function saveBest(){try{localStorage.setItem(bestKey(),String(best));}catch(e){} if(window.OB)OB.submitScore('block-nine',best);}

function preseed(){ // Hard mode starts with scattered blocks
  if(mode!=='hard')return;
  let n=6;while(n>0){const r=Math.floor(rng()*N),c=Math.floor(rng()*N);
    if(!board[r][c]){board[r][c]=PAL[6];n--;}}
}
function sizePieces(){ // fit tray piece blocks to slot width
  const slotW=(trayEl.getBoundingClientRect().width-20)/3-20;
  const pb=Math.max(14,Math.min(24,Math.floor(slotW/5)));
  document.documentElement.style.setProperty('--pb',pb+'px');
}
function flash(msg){const t=document.getElementById('toast2');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1500);}
function newGame(seed){
  curSeed=(seed===undefined||seed===null)?(Math.floor(Math.random()*4294967296)>>>0):(seed>>>0);
  rng=mulberry32(curSeed);
  board=Array.from({length:N},()=>Array(N).fill(0));
  score=0;combo=0;
  buildBoardDOM();preseed();paintBoard();
  loadBest();refillPieces();updateScore();
  overEl.classList.remove('show');
  sizePieces();renderTray();
  const ce=document.getElementById('code');if(ce)ce.textContent=encodeCode();
  saveGame();
}

var SAVE_KEY='blocknine_save';
function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({v:1,board:board,score:score,combo:combo,mode:mode,curSeed:curSeed,pieces:pieces}));}catch(e){}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function restoreGame(){
  try{
    var s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
    if(!s||s.v!==1||!Array.isArray(s.board)||!Array.isArray(s.pieces))return false;
    mode=s.mode||'normal';curSeed=(s.curSeed>>>0);rng=mulberry32(curSeed);
    board=s.board;score=s.score||0;combo=s.combo||0;pieces=s.pieces;
    document.querySelectorAll('.mode').forEach(function(m){m.setAttribute('aria-pressed',m.dataset.mode===mode);});
    buildBoardDOM();paintBoard();loadBest();updateScore();
    overEl.classList.remove('show');sizePieces();renderTray();
    var ce=document.getElementById('code');if(ce)ce.textContent=encodeCode();
    return true;
  }catch(e){return false;}
}
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden'&&!overEl.classList.contains('show'))saveGame();});

document.getElementById('modes').addEventListener('click',e=>{
  const b=e.target.closest('.mode');if(!b)return;
  mode=b.dataset.mode;
  document.querySelectorAll('.mode').forEach(m=>m.setAttribute('aria-pressed',m===b));
  newGame();
});
document.getElementById('again').addEventListener('click',()=>newGame(curSeed)); // replay SAME board
function copyCode(){navigator.clipboard.writeText(encodeCode()).then(()=>flash('Code copied — send it to your friend!')).catch(()=>flash('Copy failed'));}
document.getElementById('copyCode').addEventListener('click',copyCode);
document.getElementById('copyFin').addEventListener('click',copyCode);
document.getElementById('goCode').addEventListener('click',()=>{
  const d=decodeCode(document.getElementById('codeIn').value);
  if(!d){flash('Hmm — that code looks wrong');return;}
  mode=d.mode;document.querySelectorAll('.mode').forEach(m=>m.setAttribute('aria-pressed',m.dataset.mode===mode));
  newGame(d.seed);document.getElementById('codeIn').value='';flash('Loaded their board — good luck!');
});
document.getElementById('codeIn').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('goCode').click();});
window.addEventListener('resize',()=>{sizePieces();renderTray();});

mode='normal';
if(!restoreGame())newGame();
</script>
